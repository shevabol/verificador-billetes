<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Billetes</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    margin:0;
    color:white;
}

#videoContainer{
    position:relative;
    width:100%;
    max-width:500px;
    margin:20px auto;
}

video{
    width:100%;
    border-radius:15px;
}

#scanArea{
    position:absolute;
    width:80%;
    height:15%;
    top:42.5%;
    left:10%;
    border:3px solid #00ffcc;
    border-radius:10px;
    box-sizing:border-box;
    box-shadow:0 0 15px #00ffcc;
}

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#activar{
    background:#2196f3;
    color:white;
    padding:12px 25px;
    font-size:16px;
    margin:10px;
}

#validar{
    background:linear-gradient(45deg,#00c853,#64dd17);
    color:white;
    padding:20px 40px;
    font-size:22px;
    font-weight:bold;
    margin:20px auto;
    display:block;
    width:80%;
    max-width:400px;
}

#numero{
    font-size:24px;
    font-weight:bold;
    color:#00ffcc;
    margin-top:10px;
}

#resultado{
    font-size:26px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<h2>Escanear Número de Serie</h2>

<div id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanArea"></div>
</div>

<button id="activar">Activar Cámara</button>

<p>Número detectado:</p>
<p id="numero">---</p>

<button id="validar">VERIFICAR</button>

<p id="resultado"></p>

<script>

const video = document.getElementById('video');
const numeroSpan = document.getElementById('numero');
const resultado = document.getElementById('resultado');

let ultimoNumero = "";
let escaneando = false;
let worker;

async function iniciarOCR(){
    worker = await Tesseract.createWorker('eng');
}

document.getElementById("activar").onclick = async function(){

    numeroSpan.innerText = "---";
    resultado.innerText = "";
    ultimoNumero = "";

    if(!worker) await iniciarOCR();

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
    });

    video.srcObject = stream;

    // 🔹 Esperar que el video esté realmente listo
    video.onloadedmetadata = () => {
        escaneando = true;
        detectar();
    };
};

async function detectar(){

    if(!escaneando) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if(!vw || !vh){
        setTimeout(detectar, 500);
        return;
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = vw * 0.8;
    canvas.height = vh * 0.15;

    ctx.drawImage(
        video,
        vw * 0.1,
        vh * 0.425,
        vw * 0.8,
        vh * 0.15,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const { data:{ text } } = await worker.recognize(canvas);
    let limpio = text.replace(/[^0-9]/g,"");

    if(limpio.length >= 7){
        ultimoNumero = limpio;
        numeroSpan.innerText = limpio;
        numeroSpan.style.color="#00ff00";
        escaneando = false;
        confirmar();
        return;
    }

    setTimeout(detectar, 900);
}

function confirmar(){
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.play();

    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

document.getElementById("validar").onclick = function(){

    if(!ultimoNumero){
        resultado.innerText = "No se detectó número válido.";
        resultado.style.color="yellow";
        return;
    }

    const anulados = [
        "01234567",
        "02345678",
        "03456789"
    ];

    if(anulados.includes(ultimoNumero)){
        resultado.innerHTML = "❌ INHABILITADO";
        resultado.style.color="red";
    }else{
        resultado.innerHTML = "✅ HABILITADO";
        resultado.style.color="#00ff00";
    }
};

</script>

</body>
</html>
