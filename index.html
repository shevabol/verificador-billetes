<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* TITULO */
#titulo{
    padding:15px;
    font-size:18px;
    font-weight:bold;
    background:#111827;
}

/* VIDEO */
#videoContainer{
    position:relative;
    width:100%;
    height:65vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RECTANGULO */
#scanBox{
    position:absolute;
    border:4px solid #00ff88;
    width:70%;
    height:20%;
    left:15%;
    top:40%;
    border-radius:10px;
}

/* PANEL */
#panel{
    padding:15px;
}

#detectedNumber{
    font-size:18px;
    margin-bottom:10px;
    min-height:22px;
}

select{
    width:100%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    margin-bottom:10px;
    border:none;
}

button{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    font-weight:bold;
}

#btnValidar{
    background:#00ff88;
    color:black;
}

#btnReset{
    background:#334155;
    color:white;
}

#resultado{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>

<body>

<div id="titulo">
VALIDADOR DE NUMEROS DE SERIE (BILLETES 10,20,50 SERIE B)
</div>

<div id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanBox"></div>
</div>

<div id="panel">

    <div id="detectedNumber">
        Número detectado: ---
    </div>

    <select id="corte">
        <option value="10">Billete 10</option>
        <option value="20">Billete 20</option>
        <option value="50">Billete 50</option>
    </select>

    <button id="btnValidar">VALIDAR</button>
    <button id="btnReset">ESCANEAR OTRO</button>

    <div id="resultado"></div>

</div>

<script>

// =====================
// RANGOS (INHABILITADOS)
// =====================

const rangos = {

10: [
[77100001,77550000],
[78000001,78450000],
[78900001,96350000],
[96350001,96800000],
[96800001,97250000],
[98150001,98600000],
[104900001,105350000],
[105350001,105800000],
[106700001,107150000],
[107600001,108050000],
[108050001,108500000],
[109400001,109850000]
],

20: [
[87280145,91646549],
[96650001,97100000],
[99800001,100250000],
[100250001,100700000],
[109250001,109700000],
[110600001,111050000],
[111050001,111500000],
[111950001,112400000],
[112400001,112850000],
[112850001,113300000],
[114200001,114650000],
[114650001,115100000],
[115100001,115550000],
[118700001,119150000],
[119150001,119600000],
[120500001,120950000]
],

50: [
[67250001,67700000],
[69050001,69500000],
[69500001,69950000],
[69950001,70400000],
[70400001,70850000],
[70850001,71300000],
[76310012,85139995],
[86400001,86850000],
[90900001,91350000],
[91800001,92250000]
]

};

let numeroDetectado = "";

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
})
.then(stream=>{
    video.srcObject = stream;
});

// =====================
// OCR SOLO EN RECTANGULO
// =====================

async function detectar(){

    if(video.videoWidth === 0){
        setTimeout(detectar,500);
        return;
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // Coordenadas exactas del rectángulo verde
    const x = vw * 0.15;
    const y = vh * 0.40;
    const w = vw * 0.70;
    const h = vh * 0.20;

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

    const { data:{ text } } = await Tesseract.recognize(canvas,"eng");

    const match = text.replace(/\D/g,"");

    if(match.length>=8){
        numeroDetectado = match;
        document.getElementById("detectedNumber").innerText =
        "Número detectado: "+numeroDetectado;
    }

    setTimeout(detectar,1000);
}

video.onloadedmetadata = ()=> detectar();

// =====================
// VALIDAR
// =====================

function validar(){

    if(!numeroDetectado) return;

    const corteSeleccionado = document.getElementById("corte").value;
    const num = parseInt(numeroDetectado);
    let inhabilitado = false;

    for(let rango of rangos[corteSeleccionado]){
        if(num>=rango[0] && num<=rango[1]){
            inhabilitado = true;
            break;
        }
    }

    if(inhabilitado){
        mostrarResultado("BILLETE INHABILITADO",false);
    }else{
        mostrarResultado("BILLETE HABILITADO",true);
    }
}

function mostrarResultado(texto,ok){

    const r = document.getElementById("resultado");
    r.innerText = texto;
    r.style.color = ok ? "#00ff88" : "#ff4444";

    const audio = new Audio(ok ?
        "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" :
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );
    audio.play();
}

document.getElementById("btnValidar").onclick = validar;

document.getElementById("btnReset").onclick = ()=>{
    numeroDetectado="";
    document.getElementById("detectedNumber").innerText =
    "Número detectado: ---";
    document.getElementById("resultado").innerText="";
};

</script>

</body>
</html>
