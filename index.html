<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificador de Billetes BCB</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    padding:20px;
    color:white;
}

h2{
    margin-bottom:10px;
}

#overlay{
    position:relative;
    display:inline-block;
}

video{
    width:100%;
    max-width:500px;
    border-radius:15px;
    margin-top:20px;
}

#guide{
    position:absolute;
    border:3px solid #00ff00;
    width:60%;
    height:12%;
    left:20%;
    top:50%;
    transform:translateY(-50%);
    box-sizing:border-box;
    pointer-events:none;
    box-shadow:0 0 15px #00ff00;
}

button{
    padding:16px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:10px;
    width:90%;
    max-width:400px;
    cursor:pointer;
}

.btn-activar{
    background:#ff9800;
    color:white;
}

.btn-capturar{
    background:#03a9f4;
    color:white;
    font-weight:bold;
}

.btn-verificar{
    background:linear-gradient(45deg,#00c853,#64dd17);
    color:white;
    font-size:22px;
    font-weight:bold;
}

select, input{
    padding:14px;
    font-size:18px;
    width:90%;
    max-width:400px;
    margin:10px 0;
    text-align:center;
    border-radius:10px;
    border:none;
}

#numero{
    font-weight:bold;
    font-size:20px;
}

#resultado{
    font-size:30px;
    margin-top:15px;
    font-weight:bold;
}

canvas{
    display:none;
}
</style>
</head>

<body>

<h2>Verificador de Billetes Serie B</h2>

<select id="corte">
<option value="10">Bs 10</option>
<option value="20">Bs 20</option>
<option value="50">Bs 50</option>
</select>

<button class="btn-activar" onclick="iniciarCamara()">📷 Activar Cámara</button>

<div id="overlay">
    <video id="video" autoplay playsinline></video>
    <div id="guide"></div>
</div>

<canvas id="canvas"></canvas>

<button class="btn-capturar" onclick="capturar()">📸 Capturar Número</button>

<input type="text" id="numero" placeholder="Número detectado">

<button class="btn-verificar" onclick="verificar()">✅ VERIFICAR</button>

<div id="resultado"></div>

<script>

let currentStream;
let worker;
let workerReady = false;

// === INICIALIZAR OCR UNA SOLA VEZ ===
async function iniciarOCR(){
    worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: 7
    });
    workerReady = true;
}
iniciarOCR();


// === TODOS LOS RANGOS COMPLETOS ===
const rangos = {

10: [
[77100001,77550000],
[78000001,78450000],
[78900001,96350000],
[96350001,96800000],
[96800001,97250000],
[98150001,98600000],
[104900001,105350000],
[105350001,105800000],
[106700001,107150000],
[107600001,108050000],
[108050001,108500000],
[109400001,109850000]
],

20: [
[87280145,91646549],
[96650001,97100000],
[99800001,100250000],
[100250001,100700000],
[109250001,109700000],
[110600001,111050000],
[111050001,111500000],
[111950001,112400000],
[112400001,112850000],
[112850001,113300000],
[114200001,114650000],
[114650001,115100000],
[115100001,115550000],
[118700001,119150000],
[119150001,119600000],
[120500001,120950000]
],

50: [
[67250001,67700000],
[69050001,69500000],
[69500001,69950000],
[69950001,70400000],
[70400001,70850000],
[70850001,71300000],
[76310012,85139995],
[86400001,86850000],
[90900001,91350000],
[91800001,92250000]
]

};


// === CÁMARA ===
async function iniciarCamara(){

  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    });

    currentStream = stream;
    document.getElementById("video").srcObject = stream;

  }catch(e){
    alert("No se pudo activar la cámara.");
  }
}


// === CAPTURA (MISMA LÓGICA ORIGINAL) ===
async function capturar(){

  if(!workerReady){
    alert("OCR aún cargando...");
    return;
  }

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  let w = canvas.width * 0.60;
  let h = canvas.height * 0.12;
  let x = canvas.width * 0.20;
  let y = (canvas.height - h) / 2;

  let imageData = ctx.getImageData(x,y,w,h);
  let data = imageData.data;

  for(let i=0;i<data.length;i+=4){
      let gray = 0.3*data[i] + 0.59*data[i+1] + 0.11*data[i+2];
      let contrast = gray > 130 ? 255 : 0;
      data[i]=data[i+1]=data[i+2]=contrast;
  }

  let tempCanvas = document.createElement("canvas");
  tempCanvas.width = w;
  tempCanvas.height = h;
  tempCanvas.getContext("2d").putImageData(imageData,0,0);

  const { data:{ text } } = await worker.recognize(tempCanvas);

  let numeros = text.replace(/\D/g,'');

  if(numeros.length >= 7 && numeros.length <= 9){
      document.getElementById("numero").value = numeros;
      document.getElementById("resultado").innerHTML="";
      feedbackCaptura();
  }else{
      document.getElementById("numero").value="";
  }
}


// === FEEDBACK ===
function feedbackCaptura(){
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.play();
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}


// === VERIFICACIÓN ===
function verificar(){

let corte=document.getElementById("corte").value;
let numero=document.getElementById("numero").value.trim();
let resultado=document.getElementById("resultado");

if(numero===""){
resultado.innerHTML="⚠️ Número inválido";
resultado.style.color="orange";
return;
}

let numeroInt = parseInt(numero);
let inhabilitado=false;

rangos[corte].forEach(r=>{
if(numeroInt>=r[0] && numeroInt<=r[1]){
inhabilitado=true;
}
});

if(inhabilitado){
resultado.innerHTML="🔴 INHABILITADO";
resultado.style.color="red";
}else{
resultado.innerHTML="🟢 HABILITADO";
resultado.style.color="#00ff00";
}
}

</script>

</body>
</html>
