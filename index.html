<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Validador</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    text-align:center;
    color:white;
}

#container{
    position:relative;
    display:inline-block;
}

video{
    width:100%;
    max-width:480px;
    border-radius:12px;
}

#scanBox{
    position:absolute;
    border:4px solid #00ff88;
    width:70%;
    height:20%;
    left:15%;
    top:40%;
    border-radius:8px;
}

#detectedNumber{
    margin-top:15px;
    font-size:20px;
    background:#1e293b;
    padding:12px;
    border-radius:8px;
    width:300px;
    margin-left:auto;
    margin-right:auto;
    transition:0.3s;
}

.detectado{
    background:#064e3b !important;
    box-shadow:0 0 10px #00ff88;
}

button{
    margin:10px;
    padding:18px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

#btnValidar{
    background:#00ff88;
    color:black;
}

#btnValidar:active{
    transform:scale(0.95);
}

#btnReset{
    background:#334155;
    color:white;
}

#resultado{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>

<body>

<h2>Validador de Números</h2>

<div id="container">
    <video id="video" autoplay playsinline></video>
    <div id="scanBox"></div>
</div>

<div id="detectedNumber">Número detectado: ---</div>

<button id="btnValidar">VALIDAR</button>
<button id="btnReset">ESCANEAR OTRO</button>

<div id="resultado"></div>

<script>

// =====================
// RANGOS COMPLETOS
// =====================

const rangos = {

10: [
[77100001,77550000],
[78000001,78450000],
[78900001,96350000],
[96350001,96800000],
[96800001,97250000],
[98150001,98600000],
[104900001,105350000],
[105350001,105800000],
[106700001,107150000],
[107600001,108050000],
[108050001,108500000],
[109400001,109850000]
],

20: [
[87280145,91646549],
[96650001,97100000],
[99800001,100250000],
[100250001,100700000],
[109250001,109700000],
[110600001,111050000],
[111050001,111500000],
[111950001,112400000],
[112400001,112850000],
[112850001,113300000],
[114200001,114650000],
[114650001,115100000],
[115100001,115550000],
[118700001,119150000],
[119150001,119600000],
[120500001,120950000]
],

50: [
[67250001,67700000],
[69050001,69500000],
[69500001,69950000],
[69950001,70400000],
[70400001,70850000],
[70850001,71300000],
[76310012,85139995],
[86400001,86850000],
[90900001,91350000],
[91800001,92250000]
]

};

let numeroDetectado = "";

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
})
.then(stream=>{
    video.srcObject = stream;
});

async function detectar(){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    const { data:{ text } } = await Tesseract.recognize(canvas,"eng");

    const match = text.replace(/\D/g,"");

    if(match.length>=8){
        numeroDetectado = match;
        const campo = document.getElementById("detectedNumber");
        campo.innerText = "Número detectado: "+numeroDetectado;
        campo.classList.add("detectado");
    }

    setTimeout(detectar,1000);
}

video.onloadedmetadata = ()=> detectar();

function validar(){

    if(!numeroDetectado) return;

    const num = parseInt(numeroDetectado);
    let encontrado = false;

    for(let valor in rangos){
        for(let rango of rangos[valor]){
            if(num>=rango[0] && num<=rango[1]){
                mostrarResultado("✅ VÁLIDO - "+valor,true);
                encontrado = true;
                break;
            }
        }
    }

    if(!encontrado){
        mostrarResultado("❌ NO VÁLIDO",false);
    }
}

function mostrarResultado(texto,ok){

    const r = document.getElementById("resultado");
    r.innerText = texto;
    r.style.color = ok ? "#00ff88" : "#ff4444";

    const audio = new Audio(ok ?
        "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" :
        "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    );
    audio.play();
}

document.getElementById("btnValidar").onclick = validar;

document.getElementById("btnReset").onclick = ()=>{
    numeroDetectado = "";
    document.getElementById("detectedNumber").innerText = "Número detectado: ---";
    document.getElementById("detectedNumber").classList.remove("detectado");
    document.getElementById("resultado").innerText = "";
};

</script>

</body>
</html>
