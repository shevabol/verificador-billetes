<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Validador Serie B</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:10px;
    font-size:22px;
}

#cameraContainer{
    position:relative;
    width:100%;
    height:55vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#scanBox{
    position:absolute;
    width:70%;
    height:20%;
    left:15%;
    top:40%;
    border:4px solid #00ff00;
    border-radius:10px;
    box-shadow:0 0 15px #00ff00;
}

#overlayResult{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    font-weight:bold;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}

#controls{
    padding:15px;
}

select,button{
    padding:12px;
    font-size:18px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#007bff;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#0056b3;
}

#detectedNumber{
    font-size:18px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>VALIDADOR DE NUMEROS DE SERIE (BILLETES 10,20,50 SERIE B)</h1>

<div id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanBox"></div>
    <div id="overlayResult"></div>
</div>

<div id="controls">
    <select id="corte">
        <option value="10">Corte 10</option>
        <option value="20">Corte 20</option>
        <option value="50">Corte 50</option>
    </select>

    <button onclick="detectar()">Escanear</button>
    <button onclick="location.reload()">Escanear Otro</button>

    <div id="detectedNumber">Número detectado: ---</div>
</div>

<script>

let video = document.getElementById("video");
let numeroDetectado = "";

// RANGOS INHABILITADOS (LOS QUE NO CIRCULAN)
const rangos = {
10:[
[28874500,28875000],
[50000000,50001000]
],
20:[
[30000000,30005000]
],
50:[
[90000000,90002000]
]
};

// Activar cámara
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{
    video.srcObject = stream;
});

// Función validar
function validar(numero,corte){
    const n = parseInt(numero);
    for(let r of rangos[corte]){
        if(n>=r[0] && n<=r[1]){
            return false; // Está INHABILITADO
        }
    }
    return true; // Está HABILITADO
}

// Mostrar overlay
function mostrarResultado(esValido){

    const overlay = document.getElementById("overlayResult");

    overlay.style.display="block";

    if(esValido){
        overlay.innerText="BILLETE HABILITADO";
        overlay.style.background="rgba(0,150,0,0.85)";
    }else{
        overlay.innerText="BILLETE INHABILITADO";
        overlay.style.background="rgba(200,0,0,0.85)";
    }

    setTimeout(()=>{
        overlay.style.display="none";
    },2500);
}

// Detección manual
async function detectar(){

    if(video.videoWidth===0) return;

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    const vw=video.videoWidth;
    const vh=video.videoHeight;

    const x=vw*0.15;
    const y=vh*0.40;
    const w=vw*0.70;
    const h=vh*0.20;

    canvas.width=w;
    canvas.height=h;

    ctx.drawImage(video,x,y,w,h,0,0,w,h);

    const {data:{text}} = await Tesseract.recognize(canvas,"eng");

    const numero = text.replace(/\D/g,"");

    if(numero.length>=8){
        numeroDetectado=numero;
        document.getElementById("detectedNumber").innerText =
        "Número detectado: "+numero;

        const corte=document.getElementById("corte").value;

        const esValido = validar(numero,corte);

        mostrarResultado(esValido);
    }
}

</script>

</body>
</html>
