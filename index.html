<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificador de Billetes BCB</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
    padding:20px;
}

h2{
    margin-bottom:10px;
}

select, input{
    padding:12px;
    font-size:18px;
    width:90%;
    max-width:400px;
    margin:10px 0;
    text-align:center;
}

button{
    padding:15px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#000;
    color:white;
    width:90%;
    max-width:400px;
}

video{
    width:100%;
    max-width:500px;
    height:auto;
    border-radius:15px;
    margin-top:20px;
}

canvas{
    display:none;
}

#resultado{
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Verificador de Billetes Serie B</h2>

<select id="corte">
<option value="10">Bs 10</option>
<option value="20">Bs 20</option>
<option value="50">Bs 50</option>
</select>

<br>

<button onclick="iniciarCamara()">Activar Cámara</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>

<button onclick="capturar()">Capturar Número</button>

<br>

<input type="text" id="numero" placeholder="Número detectado">

<br>

<button onclick="verificar()">Verificar</button>

<div id="resultado"></div>

<script>

let currentStream;

const rangos = {
10: [
[77100001,77550000],[78000001,78450000],[78900001,96350000],
[96350001,96800000],[96800001,97250000],[98150001,98600000],
[104900001,105350000],[105350001,105800000],[106700001,107150000],
[107600001,108050000],[108050001,108500000],[109400001,109850000]
],
20: [
[87280145,91646549],[96650001,97100000],[99800001,100250000],
[100250001,100700000],[109250001,109700000],[110600001,111050000],
[111050001,111500000],[111950001,112400000],[112400001,112850000],
[112850001,113300000],[114200001,114650000],[114650001,115100000],
[115100001,115550000],[118700001,119150000],[119150001,119600000],
[120500001,120950000]
],
50: [
[67250001,67700000],[69050001,69500000],[69500001,69950000],
[69950001,70400000],[70400001,70850000],[70850001,71300000],
[76310012,85139995],[86400001,86850000],[90900001,91350000],
[91800001,92250000]
]
};

async function iniciarCamara() {

  const devices = await navigator.mediaDevices.enumerateDevices();
  const videoDevices = devices.filter(device => device.kind === "videoinput");

  let trasera = videoDevices.find(device => device.label.toLowerCase().includes("back") || device.label.toLowerCase().includes("rear"));

  let deviceId = trasera ? trasera.deviceId : videoDevices[0].deviceId;

  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      deviceId: { exact: deviceId },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  currentStream = stream;
  document.getElementById("video").srcObject = stream;
}

function capturar() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  Tesseract.recognize(canvas, 'eng', {
    tessedit_char_whitelist: '0123456789'
  }).then(({ data: { text } }) => {

    let numeros = text.replace(/\D/g, '');
    document.getElementById("numero").value = numeros;

  });

}

function verificar(){

let corte=document.getElementById("corte").value;
let numero=document.getElementById("numero").value.trim();
let resultado=document.getElementById("resultado");

let inhabilitado=false;

rangos[corte].forEach(r=>{
if(parseInt(numero)>=r[0] && parseInt(numero)<=r[1]){
inhabilitado=true;
}
});

if(inhabilitado){
resultado.innerHTML="🔴 INHABILITADO";
resultado.style.color="red";
}else{
resultado.innerHTML="🟢 HABILITADO";
resultado.style.color="green";
}
}

</script>

</body>
</html>
