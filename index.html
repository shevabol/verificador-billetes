<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificador de Billetes BCB</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
    padding:20px;
}

#overlay{
    position:relative;
    display:inline-block;
}

video{
    width:100%;
    max-width:500px;
    border-radius:15px;
    margin-top:20px;
}

#guide{
    position:absolute;
    border:3px solid lime;
    width:60%;
    height:12%;
    left:20%;
    top:50%;
    transform:translateY(-50%);
    box-sizing:border-box;
    pointer-events:none;
}

button{
    padding:15px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#000;
    color:white;
    width:90%;
    max-width:400px;
}

select, input{
    padding:12px;
    font-size:18px;
    width:90%;
    max-width:400px;
    margin:10px 0;
    text-align:center;
    border-radius:8px;
    border:1px solid #ccc;
}

#resultado{
    font-size:28px;
    margin-top:15px;
    font-weight:bold;
}

canvas{
    display:none;
}
</style>
</head>

<body>

<h2>Verificador de Billetes Serie B</h2>

<select id="corte">
<option value="10">Bs 10</option>
<option value="20">Bs 20</option>
<option value="50">Bs 50</option>
</select>

<button onclick="iniciarCamara()">Activar Cámara</button>

<div id="overlay">
    <video id="video" autoplay playsinline></video>
    <div id="guide"></div>
</div>

<canvas id="canvas"></canvas>

<button onclick="capturar()">Capturar Número</button>

<input type="text" id="numero" placeholder="Número detectado">

<button onclick="verificar()">Verificar</button>

<div id="resultado"></div>

<script>

let currentStream;
let worker;
let workerReady = false;

// === CREAR WORKER UNA SOLA VEZ ===
async function iniciarOCR(){
    worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng');
    await worker.initialize('eng');
    await worker.setParameters({
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: 7
    });
    workerReady = true;
}

iniciarOCR();

const rangos = {
10:[[77100001,77550000]],
20:[[87280145,91646549]],
50:[[67250001,67700000]]
};

async function iniciarCamara(){

  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    });

    currentStream = stream;
    document.getElementById("video").srcObject = stream;

  }catch(e){
    alert("No se pudo activar la cámara.");
  }
}

async function capturar(){

  if(!workerReady){
    alert("OCR aún cargando, espera un momento...");
    return;
  }

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  let w = canvas.width * 0.60;
  let h = canvas.height * 0.12;
  let x = canvas.width * 0.20;
  let y = (canvas.height - h) / 2;

  let imageData = ctx.getImageData(x,y,w,h);
  let data = imageData.data;

  for(let i=0;i<data.length;i+=4){
      let gray = 0.3*data[i] + 0.59*data[i+1] + 0.11*data[i+2];
      let contrast = gray > 130 ? 255 : 0;
      data[i]=data[i+1]=data[i+2]=contrast;
  }

  let tempCanvas = document.createElement("canvas");
  tempCanvas.width = w;
  tempCanvas.height = h;
  tempCanvas.getContext("2d").putImageData(imageData,0,0);

  const { data:{ text } } = await worker.recognize(tempCanvas);

  let numeros = text.replace(/\D/g,'');

  if(numeros.length >= 7 && numeros.length <= 9){
      document.getElementById("numero").value = numeros;
      document.getElementById("resultado").innerHTML="";
  }else{
      document.getElementById("numero").value="";
  }
}

function verificar(){

let corte=document.getElementById("corte").value;
let numero=document.getElementById("numero").value.trim();
let resultado=document.getElementById("resultado");

if(numero===""){
resultado.innerHTML="⚠️ Número inválido";
resultado.style.color="orange";
return;
}

let inhabilitado=false;

rangos[corte].forEach(r=>{
if(parseInt(numero)>=r[0] && parseInt(numero)<=r[1]){
inhabilitado=true;
}
});

if(inhabilitado){
resultado.innerHTML="🔴 INHABILITADO";
resultado.style.color="red";
}else{
resultado.innerHTML="🟢 HABILITADO";
resultado.style.color="green";
}
}

</script>

</body>
</html>
