<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Billetes</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
    margin:0;
}

h2{
    margin-top:15px;
}

#videoContainer{
    position:relative;
    width:100%;
    max-width:500px;
    margin:auto;
}

video{
    width:100%;
    border-radius:12px;
}

#scanArea{
    position:absolute;
    width:80%;
    height:15%;
    top:42.5%;
    left:10%;
    border:3px solid red;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    padding:15px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#activar{
    background:#007bff;
    color:white;
}

#validar{
    background:#28a745;
    color:white;
    font-size:22px;
    font-weight:bold;
    width:80%;
    max-width:400px;
}

#numero{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

#resultado{
    font-size:28px;
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<h2>Escanear Número de Serie</h2>

<div id="videoContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanArea"></div>
</div>

<button id="activar">Activar Cámara</button>

<p>Número detectado:</p>
<p id="numero">---</p>

<button id="validar">VERIFICAR</button>

<p id="resultado"></p>

<script>

const video = document.getElementById('video');
const numeroSpan = document.getElementById('numero');
const resultado = document.getElementById('resultado');

let ultimoNumero = "";
let escaneando = false;
let worker;

async function iniciarOCR(){
    worker = await Tesseract.createWorker('eng');
}

document.getElementById("activar").onclick = async function(){

    numeroSpan.innerText="---";
    resultado.innerText="";
    ultimoNumero="";

    if(!worker) await iniciarOCR();

    const stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: { exact: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    });

    video.srcObject = stream;
    escaneando = true;
    detectar();
};

async function detectar(){

    if(!escaneando) return;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if(vw === 0){
        setTimeout(detectar, 300);
        return;
    }

    canvas.width = vw * 0.8;
    canvas.height = vh * 0.15;

    ctx.drawImage(
        video,
        vw * 0.1,
        vh * 0.425,
        vw * 0.8,
        vh * 0.15,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const { data:{ text } } = await worker.recognize(canvas);

    let limpio = text.replace(/[^0-9]/g,"");

    if(limpio.length >= 7){
        ultimoNumero = limpio;
        numeroSpan.innerText = limpio;
        numeroSpan.style.color="green";
        escaneando = false;
        feedback();
        return;
    }

    setTimeout(detectar, 800);
}

function feedback(){
    // Sonido
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.play();

    // Vibración
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

document.getElementById("validar").onclick = function(){

    if(!ultimoNumero){
        resultado.innerText="No se detectó número válido.";
        resultado.style.color="orange";
        return;
    }

    const anulados = [
        "01234567",
        "02345678",
        "03456789"
    ];

    if(anulados.includes(ultimoNumero)){
        resultado.innerHTML="❌ INHABILITADO";
        resultado.style.color="red";
    }else{
        resultado.innerHTML="✅ HABILITADO";
        resultado.style.color="green";
    }
};

</script>

</body>
</html>
