<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Validador Serie B</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

h2{
    margin:10px 0;
    font-size:18px;
}

#cameraContainer{
    position:relative;
    width:100%;
    height:50vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#scanBox{
    position:absolute;
    width:70%;
    height:20%;
    left:15%;
    top:40%;
    border:3px solid #00ff00;
    border-radius:8px;
}

#overlayResultado{
    position:absolute;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    padding:8px 16px;
    font-size:20px;
    font-weight:bold;
    border-radius:8px;
    display:none;
    z-index:10;
    color:white;
}

#controls{
    padding:10px;
}

select,button{
    padding:8px;
    font-size:16px;
    margin:6px;
    border-radius:6px;
    border:none;
}

button{
    background:#007bff;
    color:white;
    font-weight:bold;
}

button:active{
    background:#0056b3;
}

#detectedNumber{
    font-size:16px;
    margin-top:8px;
}
</style>
</head>

<body>

<h2>VALIDADOR DE NUMEROS DE SERIE (BILLETES 10,20,50 SERIE B)</h2>

<div id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanBox"></div>
    <div id="overlayResultado"></div>
</div>

<div id="controls">

    <select id="corte">
        <option value="10">Corte 10</option>
        <option value="20">Corte 20</option>
        <option value="50">Corte 50</option>
    </select>

    <button onclick="detectar()">Escanear</button>
    <button onclick="location.reload()">Escanear Otro</button>

    <div id="detectedNumber">
        Número detectado: ---
    </div>

</div>

<script>

let video = document.getElementById("video");
let numeroDetectado = "";

// ⚠️ RANGOS INHABILITADOS (EDITA CON TODOS TUS RANGOS REALES)
const rangos = {
10:[
[28874500,28875000],
[50000000,50001000]
],
20:[
[30000000,30005000]
],
50:[
[90000000,90002000]
]
};

// Activar cámara trasera
navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
})
.then(stream=>{
    video.srcObject = stream;
});

// Validación
function validar(numero,corte){

    const n = parseInt(numero);

    for(let r of rangos[corte]){
        if(n>=r[0] && n<=r[1]){
            return false; // INHABILITADO
        }
    }

    return true; // HABILITADO
}

// Overlay visual
function mostrarOverlay(esValido){

    const overlay = document.getElementById("overlayResultado");

    overlay.style.display="block";

    if(esValido){
        overlay.innerText="BILLETE HABILITADO";
        overlay.style.background="rgba(0,150,0,0.85)";
    }else{
        overlay.innerText="BILLETE INHABILITADO";
        overlay.style.background="rgba(200,0,0,0.85)";
    }

    setTimeout(()=>{
        overlay.style.display="none";
    },2000);
}

// Detección manual
async function detectar(){

    if(video.videoWidth===0) return;

    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    const vw=video.videoWidth;
    const vh=video.videoHeight;

    // Coordenadas EXACTAS del rectángulo verde
    const x=vw*0.15;
    const y=vh*0.40;
    const w=vw*0.70;
    const h=vh*0.20;

    canvas.width=w;
    canvas.height=h;

    ctx.drawImage(video,x,y,w,h,0,0,w,h);

    const {data:{text}} = await Tesseract.recognize(canvas,"eng");

    const numero = text.replace(/\D/g,"");

    if(numero.length>=8){

        numeroDetectado=numero;

        document.getElementById("detectedNumber").innerText =
        "Número detectado: "+numero;

        const corte=document.getElementById("corte").value;

        const esValido = validar(numero,corte);

        mostrarOverlay(esValido);
    }
}

</script>

</body>
</html>
