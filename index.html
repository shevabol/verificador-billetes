<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificador de Billetes BCB</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
    padding:20px;
}

video{
    width:100%;
    max-width:500px;
    border-radius:15px;
    margin-top:20px;
}

#overlay{
    position:relative;
    display:inline-block;
}

#guide{
    position:absolute;
    border:4px solid lime;
    width:60%;
    height:12%;
    left:20%;
    top:75%;
    box-sizing:border-box;
    pointer-events:none;
}

button{
    padding:15px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#000;
    color:white;
    width:90%;
    max-width:400px;
}

input{
    padding:12px;
    font-size:18px;
    width:90%;
    max-width:400px;
    margin:10px 0;
    text-align:center;
}

#resultado{
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
}

canvas{
    display:none;
}
</style>
</head>

<body>

<h2>Verificador de Billetes Serie B</h2>

<button onclick="iniciarCamara()">Activar Cámara</button>

<div id="overlay">
    <video id="video" autoplay playsinline></video>
    <div id="guide"></div>
</div>

<canvas id="canvas"></canvas>

<button onclick="capturar()">Capturar Número</button>

<input type="text" id="numero" placeholder="Número detectado">

<div id="resultado"></div>

<script>

let currentStream;

async function iniciarCamara() {

  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    },
    audio:false
  });

  currentStream = stream;
  document.getElementById("video").srcObject = stream;
}

function capturar() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  // === Coordenadas EXACTAS de la guía ===
  let x = canvas.width * 0.20;
  let y = canvas.height * 0.75;
  let w = canvas.width * 0.60;
  let h = canvas.height * 0.12;

  let imageData = ctx.getImageData(x, y, w, h);
  let data = imageData.data;

  // Blanco y negro fuerte
  for (let i = 0; i < data.length; i += 4) {
    let gray = 0.3 * data[i] + 0.59 * data[i + 1] + 0.11 * data[i + 2];
    let contrast = gray > 130 ? 255 : 0;
    data[i] = contrast;
    data[i + 1] = contrast;
    data[i + 2] = contrast;
  }

  let tempCanvas = document.createElement("canvas");
  tempCanvas.width = w;
  tempCanvas.height = h;
  let tempCtx = tempCanvas.getContext("2d");
  tempCtx.putImageData(imageData, 0, 0);

  Tesseract.recognize(tempCanvas, 'eng', {
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: 7
  }).then(({ data: { text } }) => {

    let numeros = text.replace(/\D/g, '');

    // Validar longitud correcta
    if(numeros.length >= 7 && numeros.length <= 9){
        document.getElementById("numero").value = numeros;
    } else {
        document.getElementById("numero").value = "";
    }

  });

}

</script>

</body>
</html>
